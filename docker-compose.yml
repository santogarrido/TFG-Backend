services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tfg_backend_api
    restart: unless-stopped
    depends_on:
      - mysql
      - minio
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/tfg_db
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-root}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASS:-root1234}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      minio.endpoint: http://minio:9000
      minio.access-key: ${MINIO_ROOT_USER:-minioadmin}
      minio.secret-key: ${MINIO_ROOT_PASSWORD:-minioadmin123}

  mysql:
    image: mysql:8
    container_name: tfg_backend_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS:-root1234}
      MYSQL_DATABASE: tfg_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  minio:
    image: minio/minio:latest
    container_name: tfg_backend_minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  mysql_data:
  minio_data:
